<!DOCTYPE html>
<html lang="en_US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="/styles/styles.css">
    <link rel="stylesheet" href="/styles/navbar.css">
    <title>Project Details - Markdspiral</title>
  </head>
  <body>
    <main-navbar></main-navbar>

    <div class="projects-container">
        <div class="back-nav">
            <a href="/index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Projects</a>
        </div>

        <h1 class="page-title">Markdspiral</h1>

        <div class="project-detail-grid">
            <div class="project-main-content">
                <div class="project-tile project-hero-image">
                    <img src="/resources/images/markdspiral.png" title="Markdspiral screenshot"/>
                </div>

                <div class="project-tile detail-section">
                    <h3>Project Overview</h3>
                    <p>
                        Markdspiral is a markdown editor with preview. Markdown is displayed to look like on Github.
                    </p>
                </div>

                <div class="project-tile">
                    <h3>Key Features</h3>
                    <ul class="features-list">
                        <li><i class="fas fa-check" aria-hidden="true"></i> Preview with diffrent styles.</li>
                        <li><i class="fas fa-check" aria-hidden="true"></i> Spellcheck.</li>
                        <li><i class="fas fa-check" aria-hidden="true"></i> Syntax highlighting.</li>
                        <li><i class="fas fa-check" aria-hidden="true"></i> Git integration.</li>
                    </ul>
                </div>
            </div>

            <div class="project-tile">
                <h3>Tech Stack</h3>
                <div class="tech-tags">
                    <span class="tag"><img src="/resources/icons/ISO_C++_Logo.svg" aria-hidden="true" width="16px" height="16px"> C++</span>
                    <span class="tag"><img src="/resources/icons/Qt_logo_neon_2022.svg" aria-hidden="true" width="16px" height="16px"> Qt</span>
                    <span class="tag"><i class="fas fa-terminal" aria-hidden="true"></i> Cmake</span>
                </div>
            </div>

            <div class="project-tile">
                <h3>Links</h3>
                <div class="action-buttons">
                    <a href="https://github.com/N1vn0vem8er/markdpsiral" target="_blank" class="tag action-tag primary"><i class="fab fa-github" aria-hidden="true"></i> Repository</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/scripts/navbar.js"></script>
  </body>
</html>
